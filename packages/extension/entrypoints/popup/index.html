<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chrome Automation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #7c83ff; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background: #16213e;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #4ade80; }
    .dot.disconnected { background: #f87171; }
    .info { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .value { font-size: 13px; font-family: monospace; word-break: break-all; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-connect { background: #4ade80; color: #1a1a2e; }
    .btn-disconnect { background: #f87171; color: #1a1a2e; }
    .btn-settings { background: #334155; color: #e0e0e0; }
  </style>
</head>
<body>
  <h1>🔧 Chrome Automation</h1>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
